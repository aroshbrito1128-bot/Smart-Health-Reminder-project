<!DOCTYPE html>
<html>
<head>
<title>Smart Health Reminder</title>
</head>

<body>

<h2>Smart Health Reminder System</h2>

<form method="POST">

Study Hours:
<input name="study"><br><br>

Water Intake:
<select name="water">
<option>low</option>
<option>medium</option>
<option>high</option>
</select><br><br>

Sleep Time:
<input name="sleep"><br><br>

Break Interval:
<input name="break"><br><br>

<button type="submit">Check</button>

</form>

<h3>{{ result }}</h3>

</body>
</html>
